name: build-test-release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Go Test
        run: go test ./...

  e2e_geo:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
      - name: Install rvx (rs-reborn runner, latest release preferred)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci/install_rvx.sh
          echo "$PWD/.ci-bin" >> "$GITHUB_PATH"
          which rvx
          (rvx --help 2>&1 | head -n 3) || true
      - name: E2E (GSE116899)
        env:
          BULKDE_E2E_WORK_DIR: /tmp/bulkde-e2e-geo/GSE116899
          BULKDE_E2E_METHODS: limma
          BULKDE_E2E_N_GENES: "5000"
          BULKDE_E2E_NO_INSTALL: "0"
        run: bash scripts/e2e_geo_gse116899.sh

  build:
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/bulkde_${GOOS}_${GOARCH}${{ matrix.ext }}"
      - name: Archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          cd dist
          name="bulkde_${GOOS}_${GOARCH}"
          if [ "${ARCHIVE}" = "zip" ]; then
            zip -9 "${name}.zip" "${name}${EXT}"
          else
            tar -czf "${name}.tar.gz" "${name}${EXT}"
          fi
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bulkde_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/bulkde_${{ matrix.goos }}_${{ matrix.goarch }}.*
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [build, e2e_geo]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute Tag
        id: tag
        run: |
          TAG="v$(TZ=Asia/Shanghai date +%Y%m%d)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Create Or Update Tag (Force)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${TAG}"
          git push origin -f "${TAG}"

      - name: Create Or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="bulkde ${TAG}"
          notes="Automated build for ${TAG} (tag may be updated multiple times in the same day)."
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${title}" --notes "${notes}"
          else
            gh release create "${TAG}" --title "${title}" --notes "${notes}"
          fi

      - name: Upload Release Assets (Clobber)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(dist/*.tar.gz dist/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found under dist/"
            exit 1
          fi
          gh release upload "${TAG}" "${files[@]}" --clobber
